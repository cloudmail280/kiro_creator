<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar AI - TikTok Live Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Settings Panel (hide in OBS mode) -->
    <div class="settings-panel" id="settingsPanel">
        <div class="panel-header">
            <h1>Avatar AI</h1>
            <button class="toggle-btn" id="togglePanel" title="Sembunyikan panel">▼</button>
        </div>

        <div class="panel-body">
            <!-- AI Provider -->
            <div class="form-group">
                <label>Mode AI</label>
                <select id="aiMode">
                    <option value="demo">Demo (offline, jawaban random)</option>
                    <option value="gemini">Gemini API (perlu key)</option>
                </select>
            </div>

            <div class="form-group" id="apiKeyGroup" style="display:none;">
                <label>Gemini API Key <a href="https://aistudio.google.com/app/apikey" target="_blank">(dapatkan gratis)</a></label>
                <input type="password" id="apiKey" placeholder="AIzaSy...">
            </div>

            <!-- Avatar Personality -->
            <div class="form-group">
                <label>Nama Avatar</label>
                <input type="text" id="avatarName" value="Mira" maxlength="20">
            </div>

            <div class="form-group">
                <label>Personality</label>
                <textarea id="personality" rows="2">Aku Mira, AI yang ceria dan ramah. Selalu jawab singkat (max 2 kalimat) dengan bahasa Indonesia santai.</textarea>
            </div>

            <!-- Voice -->
            <div class="form-group">
                <label>Suara</label>
                <select id="voiceSelect"></select>
            </div>

            <div class="form-group inline">
                <label>Pitch <span id="pitchVal">1.2</span></label>
                <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1.2">
            </div>

            <div class="form-group inline">
                <label>Speed <span id="rateVal">1.0</span></label>
                <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1.0">
            </div>

            <!-- Chat input -->
            <div class="form-group">
                <label>Pesan ke Avatar</label>
                <div class="chat-input">
                    <input type="text" id="userMsg" placeholder="Ketik comment penonton di sini..." />
                    <button id="sendBtn">Kirim</button>
                </div>
            </div>

            <!-- Quick triggers -->
            <div class="form-group">
                <label>Quick Trigger</label>
                <div class="trigger-grid">
                    <button class="trigger-btn" data-action="like">Like</button>
                    <button class="trigger-btn" data-action="rose">Rose</button>
                    <button class="trigger-btn" data-action="gift">Big Gift</button>
                    <button class="trigger-btn" data-action="follow">Follow</button>
                </div>
            </div>

            <!-- OBS mode -->
            <div class="form-group">
                <button class="obs-btn" id="obsMode">Mode OBS (Background Transparan)</button>
            </div>

            <!-- Conversation log -->
            <div class="form-group">
                <label>Log Percakapan</label>
                <div class="chat-log" id="chatLog"></div>
            </div>
        </div>
    </div>

    <!-- Avatar Stage -->
    <div class="avatar-stage" id="avatarStage">
        <!-- Background sparkles -->
        <div class="sparkles" id="sparkles"></div>

        <!-- Speech Bubble -->
        <div class="speech-bubble" id="speechBubble">
            <span id="bubbleText"></span>
        </div>

        <!-- Avatar (SVG anime girl) -->
        <div class="avatar" id="avatar">
            <svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg" class="avatar-svg">
                <defs>
                    <!-- Hair gradient -->
                    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#a78bfa"/>
                        <stop offset="50%" stop-color="#8b5cf6"/>
                        <stop offset="100%" stop-color="#6d28d9"/>
                    </linearGradient>
                    <!-- Skin gradient -->
                    <radialGradient id="skinGrad" cx="50%" cy="40%" r="60%">
                        <stop offset="0%" stop-color="#fff5ec"/>
                        <stop offset="100%" stop-color="#fde0c8"/>
                    </radialGradient>
                    <!-- Eye gradient -->
                    <radialGradient id="eyeGrad" cx="50%" cy="30%" r="70%">
                        <stop offset="0%" stop-color="#a5d8ff"/>
                        <stop offset="60%" stop-color="#4c6ef5"/>
                        <stop offset="100%" stop-color="#2a3eb1"/>
                    </radialGradient>
                    <!-- Outfit gradient -->
                    <linearGradient id="outfitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="100%" stop-color="#e9d5ff"/>
                    </linearGradient>
                    <!-- Ribbon gradient -->
                    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff7eb5"/>
                        <stop offset="100%" stop-color="#e91e63"/>
                    </linearGradient>
                    <!-- Cheek blush -->
                    <radialGradient id="blushGrad" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#ff8aa8" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#ff8aa8" stop-opacity="0"/>
                    </radialGradient>
                </defs>

                <!-- ============ HAIR BACK (long flowing) ============ -->
                <g class="hair-back">
                    <path d="M 80 220
                             Q 60 320 70 440
                             Q 80 520 130 540
                             L 270 540
                             Q 320 520 330 440
                             Q 340 320 320 220
                             Q 200 100 80 220 Z"
                          fill="url(#hairGrad)" stroke="#3d2a78" stroke-width="2.5"/>
                </g>

                <!-- ============ NECK ============ -->
                <path d="M 175 360 L 175 400 Q 200 415 225 400 L 225 360 Z"
                      fill="url(#skinGrad)" stroke="#3d2a78" stroke-width="2"/>

                <!-- ============ OUTFIT/BODY ============ -->
                <g class="outfit">
                    <!-- Sailor collar -->
                    <path d="M 130 410 Q 200 440 270 410 L 290 460 L 110 460 Z"
                          fill="#8b5cf6" stroke="#3d2a78" stroke-width="2"/>
                    <!-- Shirt -->
                    <path d="M 110 460 Q 100 540 110 600 L 290 600 Q 300 540 290 460 Z"
                          fill="url(#outfitGrad)" stroke="#3d2a78" stroke-width="2.5"/>
                    <!-- Bow tie -->
                    <ellipse cx="200" cy="445" rx="20" ry="10" fill="url(#ribbonGrad)" stroke="#3d2a78" stroke-width="1.5"/>
                    <ellipse cx="200" cy="445" rx="6" ry="6" fill="#c2185b"/>
                </g>

                <!-- ============ HEAD/FACE ============ -->
                <g class="head">
                    <!-- Face shape (anime style: pointed chin, round cheeks) -->
                    <path d="M 130 200
                             Q 120 270 140 330
                             Q 165 380 200 388
                             Q 235 380 260 330
                             Q 280 270 270 200
                             Q 200 150 130 200 Z"
                          fill="url(#skinGrad)" stroke="#3d2a78" stroke-width="2.5"/>

                    <!-- Ear -->
                    <ellipse cx="128" cy="270" rx="10" ry="18" fill="url(#skinGrad)" stroke="#3d2a78" stroke-width="2"/>
                    <ellipse cx="272" cy="270" rx="10" ry="18" fill="url(#skinGrad)" stroke="#3d2a78" stroke-width="2"/>
                </g>

                <!-- ============ HAIR FRONT (bangs) ============ -->
                <g class="hair-front">
                    <!-- Main bangs -->
                    <path d="M 110 220
                             Q 120 140 200 110
                             Q 280 140 290 220
                             Q 280 235 250 240
                             L 240 200
                             Q 230 220 215 230
                             L 210 195
                             Q 200 220 185 235
                             L 180 200
                             Q 170 225 155 235
                             L 145 200
                             Q 130 230 110 220 Z"
                          fill="url(#hairGrad)" stroke="#3d2a78" stroke-width="2.5"/>

                    <!-- Side hair locks -->
                    <path d="M 105 215 Q 90 280 95 360 Q 110 350 115 280 Z"
                          fill="url(#hairGrad)" stroke="#3d2a78" stroke-width="2"/>
                    <path d="M 295 215 Q 310 280 305 360 Q 290 350 285 280 Z"
                          fill="url(#hairGrad)" stroke="#3d2a78" stroke-width="2"/>

                    <!-- Ahoge (cute hair antenna) -->
                    <path d="M 195 100 Q 200 70 215 75 Q 210 90 200 105 Z"
                          fill="url(#hairGrad)" stroke="#3d2a78" stroke-width="2"/>

                    <!-- Hair shine highlight -->
                    <ellipse cx="170" cy="155" rx="35" ry="8" fill="#ffffff" opacity="0.4" transform="rotate(-15 170 155)"/>
                    <ellipse cx="240" cy="155" rx="25" ry="6" fill="#ffffff" opacity="0.3" transform="rotate(10 240 155)"/>
                </g>

                <!-- ============ FACE FEATURES ============ -->
                <!-- Cheek blush -->
                <ellipse cx="155" cy="305" rx="18" ry="10" fill="url(#blushGrad)"/>
                <ellipse cx="245" cy="305" rx="18" ry="10" fill="url(#blushGrad)"/>

                <!-- Eyebrows -->
                <path d="M 145 240 Q 165 235 180 240" stroke="#6d28d9" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M 220 240 Q 235 235 255 240" stroke="#6d28d9" stroke-width="3" fill="none" stroke-linecap="round"/>

                <!-- ============ EYES (big anime eyes) ============ -->
                <!-- Left eye -->
                <g class="eye left">
                    <!-- Eye white -->
                    <ellipse cx="160" cy="280" rx="22" ry="28" fill="#ffffff" stroke="#3d2a78" stroke-width="2.5"/>
                    <!-- Eyelid (for blink) -->
                    <ellipse class="eyelid" cx="160" cy="280" rx="22" ry="0" fill="url(#skinGrad)"/>
                    <!-- Iris -->
                    <ellipse class="eyeball" cx="160" cy="282" rx="18" ry="22" fill="url(#eyeGrad)"/>
                    <!-- Pupil -->
                    <ellipse class="pupil" cx="160" cy="285" rx="6" ry="9" fill="#1a0d4a"/>
                    <!-- Big shine top -->
                    <ellipse cx="153" cy="270" rx="6" ry="8" fill="#ffffff"/>
                    <!-- Small shine bottom -->
                    <ellipse cx="167" cy="294" rx="3" ry="4" fill="#ffffff"/>
                    <!-- Eyelash top -->
                    <path d="M 138 268 Q 160 256 182 268" stroke="#1a0d4a" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <path d="M 140 263 L 142 257" stroke="#1a0d4a" stroke-width="2" stroke-linecap="round"/>
                    <path d="M 178 263 L 180 257" stroke="#1a0d4a" stroke-width="2" stroke-linecap="round"/>
                </g>

                <!-- Right eye -->
                <g class="eye right">
                    <ellipse cx="240" cy="280" rx="22" ry="28" fill="#ffffff" stroke="#3d2a78" stroke-width="2.5"/>
                    <ellipse class="eyelid" cx="240" cy="280" rx="22" ry="0" fill="url(#skinGrad)"/>
                    <ellipse class="eyeball" cx="240" cy="282" rx="18" ry="22" fill="url(#eyeGrad)"/>
                    <ellipse class="pupil" cx="240" cy="285" rx="6" ry="9" fill="#1a0d4a"/>
                    <ellipse cx="233" cy="270" rx="6" ry="8" fill="#ffffff"/>
                    <ellipse cx="247" cy="294" rx="3" ry="4" fill="#ffffff"/>
                    <path d="M 218 268 Q 240 256 262 268" stroke="#1a0d4a" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <path d="M 220 263 L 222 257" stroke="#1a0d4a" stroke-width="2" stroke-linecap="round"/>
                    <path d="M 258 263 L 260 257" stroke="#1a0d4a" stroke-width="2" stroke-linecap="round"/>
                </g>

                <!-- Tiny nose -->
                <path d="M 200 320 L 198 328 L 202 328 Z" fill="#e8a98a" opacity="0.6"/>

                <!-- ============ MOUTH (anime style, will animate via CSS) ============ -->
                <g id="mouth" class="mouth shape-closed">
                    <path class="mouth-shape" d="M 192 350 Q 200 354 208 350" stroke="#c2185b" stroke-width="2.5" fill="#ff7eb5" stroke-linecap="round"/>
                </g>

                <!-- ============ RIBBON on hair ============ -->
                <g class="ribbon" transform="translate(255 130) rotate(15)">
                    <ellipse cx="-15" cy="0" rx="14" ry="10" fill="url(#ribbonGrad)" stroke="#3d2a78" stroke-width="2"/>
                    <ellipse cx="15" cy="0" rx="14" ry="10" fill="url(#ribbonGrad)" stroke="#3d2a78" stroke-width="2"/>
                    <ellipse cx="0" cy="0" rx="6" ry="8" fill="#c2185b" stroke="#3d2a78" stroke-width="1.5"/>
                </g>
            </svg>

            <!-- Reaction emoji floats -->
            <div class="reactions" id="reactions"></div>
        </div>

        <!-- Status -->
        <div class="status" id="status">Idle</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
