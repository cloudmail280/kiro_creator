<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber Avatar AI - Live2D</title>
    <link rel="stylesheet" href="style.css">

    <!-- Live2D Cubism Core (required) -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <!-- Cubism 2 support (for older models) -->
    <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
    <!-- PIXI.js (renderer) -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <!-- pixi-live2d-display (loads Live2D models) -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>
</head>
<body>
    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="panel-header">
            <h1>✨ VTuber AI</h1>
            <button class="toggle-btn" id="togglePanel">▼</button>
        </div>

        <div class="panel-body">
            <!-- Live2D Model -->
            <div class="form-group">
                <label>Model VTuber</label>
                <select id="modelSelect">
                    <option value="https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display@master/test/assets/haru/haru_greeter_t03.model3.json">Haru (anime school girl)</option>
                    <option value="https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display@master/test/assets/shizuku/shizuku.model.json">Shizuku (anime girl, classic)</option>
                    <option value="https://cdn.jsdelivr.net/gh/Eikanya/Live2d-model@master/Bilibili-Live/22/22.model3.json">Bilibili 22 (cute boy)</option>
                    <option value="https://cdn.jsdelivr.net/gh/Eikanya/Live2d-model@master/Bilibili-Live/33/33.model3.json">Bilibili 33 (cute girl)</option>
                    <option value="https://cdn.jsdelivr.net/gh/Eikanya/Live2d-model@master/Senko_Normals/senko.model3.json">Senko (kawaii fox)</option>
                    <option value="custom">Custom URL...</option>
                </select>
            </div>

            <div class="form-group" id="customModelGroup" style="display:none;">
                <label>Custom Model URL (.model3.json / .model.json)</label>
                <input type="text" id="customModelUrl" placeholder="https://...model3.json">
                <button class="reload-btn" id="loadModelBtn">Load Model</button>
            </div>

            <!-- AI Provider -->
            <div class="form-group">
                <label>Mode AI</label>
                <select id="aiMode">
                    <option value="demo">Demo (offline)</option>
                    <option value="gemini">Gemini API</option>
                </select>
            </div>

            <div class="form-group" id="apiKeyGroup" style="display:none;">
                <label>Gemini API Key <a href="https://aistudio.google.com/app/apikey" target="_blank">(gratis)</a></label>
                <input type="password" id="apiKey" placeholder="AIzaSy...">
            </div>

            <!-- Voice Provider -->
            <div class="form-group">
                <label>Mode Suara</label>
                <select id="ttsMode">
                    <option value="browser">Browser TTS (gratis, default)</option>
                    <option value="elevenlabs">ElevenLabs (berbayar)</option>
                </select>
            </div>

            <div class="form-group elevenlabs-config" id="elevenlabsGroup" style="display:none;">
                <label>ElevenLabs API Key <a href="https://elevenlabs.io/app/settings/api-keys" target="_blank">(perlu daftar)</a></label>
                <input type="password" id="elevenApiKey" placeholder="sk_...">
            </div>

            <div class="form-group elevenlabs-config" id="elevenVoiceGroup" style="display:none;">
                <label>Voice Preset</label>
                <select id="elevenVoice">
                    <option value="EXAVITQu4vr4xnSDxMaL">Bella (cewek, soft)</option>
                    <option value="pFZP5JQG7iQjIQuC4Bku">Lily (cewek, warm)</option>
                    <option value="21m00Tcm4TlvDq8ikWAM">Rachel (cewek, calm)</option>
                    <option value="custom">Custom Voice ID...</option>
                </select>
            </div>

            <div class="form-group elevenlabs-config" id="elevenCustomGroup" style="display:none;">
                <label>Custom Voice ID</label>
                <input type="text" id="elevenCustomId" placeholder="voice_id">
            </div>

            <div class="form-group elevenlabs-config" id="elevenModelGroup" style="display:none;">
                <label>Model</label>
                <select id="elevenModel">
                    <option value="eleven_multilingual_v2">Multilingual v2</option>
                    <option value="eleven_turbo_v2_5">Turbo v2.5</option>
                </select>
            </div>

            <div class="form-group browser-tts-config">
                <label>Suara Browser</label>
                <select id="voiceSelect"></select>
            </div>

            <!-- Avatar Personality -->
            <div class="form-group">
                <label>Nama Avatar</label>
                <input type="text" id="avatarName" value="Mira" maxlength="20">
            </div>

            <div class="form-group">
                <label>Personality</label>
                <textarea id="personality" rows="2">Aku Mira, VTuber AI ceria & ramah. Jawab singkat (max 2 kalimat) bahasa Indonesia santai.</textarea>
            </div>

            <div class="form-group inline">
                <label>Pitch <span id="pitchVal">1.2</span></label>
                <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1.2">
            </div>

            <div class="form-group inline">
                <label>Speed <span id="rateVal">1.0</span></label>
                <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1.0">
            </div>

            <div class="form-group inline">
                <label>Size <span id="sizeVal">1.0</span></label>
                <input type="range" id="modelSize" min="0.3" max="2" step="0.05" value="1.0">
            </div>

            <!-- Chat input -->
            <div class="form-group">
                <label>Pesan ke Avatar</label>
                <div class="chat-input">
                    <input type="text" id="userMsg" placeholder="Ketik comment penonton..." />
                    <button id="sendBtn">Kirim</button>
                </div>
            </div>

            <!-- Quick triggers -->
            <div class="form-group">
                <label>Quick Trigger</label>
                <div class="trigger-grid">
                    <button class="trigger-btn" data-action="like">❤️ Like</button>
                    <button class="trigger-btn" data-action="rose">🌹 Rose</button>
                    <button class="trigger-btn" data-action="gift">🎁 Big Gift</button>
                    <button class="trigger-btn" data-action="follow">➕ Follow</button>
                </div>
            </div>

            <div class="form-group">
                <button class="obs-btn" id="obsMode">📺 Mode OBS (Transparan)</button>
            </div>

            <div class="form-group">
                <label>Log Percakapan</label>
                <div class="chat-log" id="chatLog"></div>
            </div>

            <div class="form-group hint">
                💡 <b>Tips:</b> Klik & drag avatar untuk pindahkan posisi. Tekan <b>H</b> untuk hide panel.
            </div>
        </div>
    </div>

    <!-- Avatar Stage -->
    <div class="avatar-stage" id="avatarStage">
        <div class="bg-glow"></div>
        <div class="sparkles" id="sparkles"></div>

        <!-- Speech Bubble -->
        <div class="speech-bubble" id="speechBubble">
            <span id="bubbleText"></span>
        </div>

        <!-- Live2D Canvas -->
        <div class="avatar-container" id="avatarContainer">
            <canvas id="live2dCanvas"></canvas>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div>Memuat model VTuber...</div>
            </div>
        </div>

        <div class="reactions" id="reactions"></div>
        <div class="status" id="status">Idle</div>
    </div>

    <!-- Hidden audio element for ElevenLabs -->
    <audio id="ttsAudio" crossorigin="anonymous" style="display:none;"></audio>

    <script src="app.js"></script>
</body>
</html>
